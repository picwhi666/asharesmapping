<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题材 Mapping — A股科技赛道研究框架</title>
<style>
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f2f1ee;
    --border: #e0deda; --border-strong: #c8c5bf;
    --text: #1a1917; --text-2: #5a5855; --text-3: #8a8784;
    --accent: #1a4fbd; --accent-bg: #eef2fc;
    --green: #166534; --green-bg: #dcfce7;
    --amber: #92400e; --amber-bg: #fef3c7;
    --blue: #1e40af; --blue-bg: #dbeafe;
    --red: #991b1b; --red-bg: #fee2e2;
    --radius: 6px; --radius-sm: 3px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1e1d1b; --surface2: #282724;
      --border: #38362f; --border-strong: #4a4840;
      --text: #f0ece4; --text-2: #a09d96; --text-3: #6a6762;
      --accent: #6b94e8; --accent-bg: #1a2540;
      --green: #4ade80; --green-bg: #052e16;
      --amber: #fbbf24; --amber-bg: #2d1d00;
      --blue: #60a5fa; --blue-bg: #0f1e3a;
      --red: #f87171; --red-bg: #2d0808;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: 14px; line-height: 1.6; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
  .header-row1 { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 12px; }
  .header-left h1 { font-size: 17px; font-weight: 600; letter-spacing: -.02em; }
  .header-left p { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
  .header-row2 { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* Search & filter bar */
  .search-input { flex: 1; min-width: 160px; max-width: 280px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; color: var(--text); font-size: 13px; font-family: inherit; }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; }
  .filter-select:focus { outline: none; border-color: var(--accent); }
  .filter-clear { font-size: 12px; color: var(--text-3); cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; }
  .filter-clear:hover { background: var(--surface2); color: var(--text); }
  .result-count { font-size: 12px; color: var(--text-3); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-2); font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .88; color: #fff; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .sync-status { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.err { background: var(--red); }
  .sync-dot.loading { background: var(--amber); animation: pulse .8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  /* Main */
  main { padding: 20px 24px 60px; }
  .no-results { text-align: center; padding: 48px; color: var(--text-3); font-size: 14px; }

  /* Category */
  .cat-header { display: flex; align-items: center; gap: 8px; margin: 28px 0 10px; }
  .cat-header:first-of-type { margin-top: 4px; }
  .cat-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }
  .cat-line { flex: 1; height: 1px; background: var(--border); }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  .card-top { display: grid; grid-template-columns: 88px 100px 80px 1fr; gap: 0; cursor: pointer; user-select: none; }
  .card-top:hover { background: var(--surface2); }
  .cell-meta { padding: 12px 14px; border-right: 1px solid var(--border); font-size: 12px; }
  .meta-label { font-size: 10px; color: var(--text-3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
  .meta-val { font-size: 13px; font-weight: 500; color: var(--text); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; margin-right: 4px; }
  .tag-blue { background: var(--blue-bg); color: var(--blue); }
  .tag-green { background: var(--green-bg); color: var(--green); }
  .tag-amber { background: var(--amber-bg); color: var(--amber); }
  .phase-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .phase-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .phase-green { background: var(--green-bg); color: var(--green); } .phase-green .phase-dot { background: var(--green); }
  .phase-blue { background: var(--blue-bg); color: var(--blue); } .phase-blue .phase-dot { background: var(--blue); }
  .phase-amber { background: var(--amber-bg); color: var(--amber); } .phase-amber .phase-dot { background: var(--amber); }
  .expand-hint { display: flex; align-items: center; gap: 6px; padding: 0 14px; }
  .chevron { font-size: 14px; color: var(--text-3); transition: transform .2s; display: inline-block; }
  .card.open .chevron { transform: rotate(180deg); }

  /* Card body */
  .card-body { display: none; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--border); }
  .card.open .card-body { display: grid; }
  .def-row { grid-column: 1/-1; padding: 10px 18px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-2); line-height: 1.65; background: var(--surface2); display: block; }
  .body-section { padding: 16px 18px; border-right: 1px solid var(--border); }
  .body-section:last-child { border-right: none; }
  .body-title { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
  .logic-item { display: flex; gap: 8px; margin-bottom: 9px; font-size: 13px; line-height: 1.55; }
  .logic-num { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; background: var(--accent-bg); color: var(--accent); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .logic-risk { font-size: 12px; color: var(--red); margin-top: 6px; padding: 6px 10px; background: var(--red-bg); border-radius: var(--radius-sm); line-height: 1.5; }
  .indicator-row { display: flex; gap: 6px; margin-bottom: 7px; font-size: 12px; }
  .ind-label { flex-shrink: 0; font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; min-width: 32px; padding-top: 1px; }
  .catalyst-item { margin-bottom: 7px; font-size: 12px; color: var(--text-2); line-height: 1.5; }

  /* Stocks */
  .stocks-grid { display: flex; flex-direction: column; gap: 6px; }
  .stock-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--surface2); border-radius: var(--radius-sm); font-size: 12px; border: 1px solid transparent; cursor: pointer; transition: background .12s, border-color .12s; }
  .stock-row:hover { background: var(--blue-bg); border-color: var(--border); }
  .stock-code { font-weight: 700; color: var(--accent); min-width: 52px; font-size: 11px; }
  .stock-name { color: var(--text); flex-shrink: 0; min-width: 60px; }
  .stock-desc { color: var(--text-3); font-size: 11px; flex: 1; }
  .stock-arrow { color: var(--text-3); font-size: 11px; flex-shrink: 0; }

  /* External link chip */
  .ext-link-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--text-3); cursor: pointer; margin-top: 8px; text-decoration: none; }
  .ext-link-chip:hover { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }

  /* Add button */
  .add-row-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; border: 1px dashed var(--border-strong); border-radius: var(--radius); background: transparent; color: var(--text-3); font-size: 13px; cursor: pointer; margin-top: 4px; transition: background .15s, color .15s; }
  .add-row-btn:hover { background: var(--surface2); color: var(--text); }

  /* Setup banner */
  .setup-banner { background: var(--amber-bg); border: 1px solid var(--amber); border-radius: 8px; padding: 16px 20px; margin: 16px 24px 0; }
  .setup-banner h3 { font-size: 14px; font-weight: 600; color: var(--amber); margin-bottom: 6px; }
  .setup-input { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .setup-input input { flex: 1; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 7px 10px; color: var(--text); font-size: 13px; font-family: monospace; }
  .setup-input input:focus { outline: none; border-color: var(--accent); }
  .readonly-notice { font-size: 12px; color: var(--text-3); padding: 8px 24px 0; }

  /* ── Stock Detail Page ── */
  .page { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 300; overflow-y: auto; }
  .page.active { display: block; }
  .page-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
  .page-back { cursor: pointer; color: var(--text-3); font-size: 20px; line-height: 1; padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); }
  .page-back:hover { background: var(--surface2); }
  .page-title { font-size: 16px; font-weight: 600; }
  .page-subtitle { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .page-body { padding: 24px; max-width: 960px; margin: 0 auto; }
  .page-save-btn { margin-left: auto; }

  /* Analysis sections */
  .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .analysis-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .analysis-section.full-width { grid-column: 1/-1; }
  .section-header { padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .section-icon { font-size: 14px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; }
  .section-body { padding: 0; }
  .analysis-textarea { width: 100%; min-height: 140px; background: transparent; border: none; padding: 14px 16px; color: var(--text); font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.65; }
  .analysis-textarea:focus { outline: none; background: var(--surface2); }
  .analysis-textarea::placeholder { color: var(--text-3); }
  .save-indicator { font-size: 11px; color: var(--text-3); margin-left: auto; }

  /* Edit overlay */
  .edit-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 400; align-items: center; justify-content: center; }
  .edit-overlay.open { display: flex; }
  .edit-panel { background: var(--surface); border-radius: 10px; width: 640px; max-width: 96vw; max-height: 88vh; overflow-y: auto; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .edit-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: inherit; resize: vertical; }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { outline: none; border-color: var(--accent); }
  .form-row textarea { min-height: 72px; }
  .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .edit-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* Highlight search */
  .highlight { background: #fef08a; color: #1a1917; border-radius: 2px; padding: 0 2px; }

  /* Market ticker bar */
  .ticker-bar { background: var(--surface); border-bottom: 1px solid var(--border); overflow: hidden; height: 46px; }
  .ticker-bar iframe { border: none; width: 100%; height: 100%; display: block; }

  /* Sector badges on cards */
  .sector-change { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; margin-left: 8px; }
  .sector-up { background: var(--green-bg); color: var(--green); }
  .sector-down { background: var(--red-bg); color: var(--red); }
  .sector-flat { background: var(--surface2); color: var(--text-3); }
  .sector-loading { background: var(--surface2); color: var(--text-3); animation: pulse .8s infinite; }

  @media (max-width: 800px) {
    .card-top { grid-template-columns: 1fr 1fr; }
    .card-body { grid-template-columns: 1fr; }
    .body-section { border-right: none; border-bottom: 1px solid var(--border); }
    .analysis-grid { grid-template-columns: 1fr; }
    .analysis-section.full-width { grid-column: 1; }
    header { padding: 12px 16px; }
    main { padding: 16px; }
    .form-2col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── Main Page ── -->
<div id="mainPage">
<!-- TradingView Ticker Tape via iframe -->
<div class="ticker-bar">
  <iframe
    src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=zh_CN#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22SSE%3A000001%22%2C%22title%22%3A%22%E4%B8%8A%E8%AF%81%22%7D%2C%7B%22proName%22%3A%22SZSE%3A399006%22%2C%22title%22%3A%22%E5%88%9B%E4%B8%9A%E6%9D%BF%22%7D%2C%7B%22proName%22%3A%22SSE%3A000688%22%2C%22title%22%3A%22%E7%A7%91%E5%88%9B50%22%7D%2C%7B%22proName%22%3A%22FOREXCOM%3ANSXUSD%22%2C%22title%22%3A%22%E7%BA%B3%E6%96%AF%E8%BE%BE%E5%85%8B%22%7D%2C%7B%22proName%22%3A%22FOREXCOM%3ASPXUSD%22%2C%22title%22%3A%22%E6%A0%87%E6%99%AE500%22%7D%2C%7B%22proName%22%3A%22TVC%3ANI225%22%2C%22title%22%3A%22%E6%97%A5%E7%BB%8F225%22%7D%2C%7B%22proName%22%3A%22KRX%3AKOSPI%22%2C%22title%22%3A%22%E9%9F%A9%E5%9B%BD%E7%BB%BC%E5%90%88%22%7D%5D%2C%22showSymbolLogo%22%3Afalse%2C%22isTransparent%22%3Atrue%2C%22displayMode%22%3A%22adaptive%22%2C%22colorTheme%22%3A%22light%22%2C%22locale%22%3A%22zh_CN%22%7D"
    style="width:100%;height:46px;border:none;display:block;"
    allowtransparency="true">
  </iframe>
</div>
<header>
  <div class="header-row1">
    <div class="header-left">
      <h1>题材 Mapping</h1>
      <p>A股科技赛道研究框架 · 持续更新</p>
    </div>
    <div class="header-actions">
      <div class="sync-status" id="syncStatus"><span class="sync-dot" id="syncDot"></span><span id="syncText">未连接</span></div>
      <button class="btn btn-primary" id="syncBtn" onclick="syncToGitHub()" style="display:none">↑ 同步</button>
      <button class="btn" id="addBtn" onclick="openAddCard()" style="display:none">＋ 新增赛道</button>
    </div>
  </div>
  <div class="header-row2">
    <input class="search-input" id="searchInput" placeholder="🔍 搜索关键词、股票代码..." oninput="applyFilters()">
    <select class="filter-select" id="filterCat" onchange="applyFilters()">
      <option value="">全部行业大类</option>
    </select>
    <select class="filter-select" id="filterSub" onchange="applyFilters()">
      <option value="">全部行业小类</option>
    </select>
    <button class="filter-clear" onclick="clearFilters()">清除筛选</button>
    <span class="result-count" id="resultCount"></span>
  </div>
</header>
<div id="setup-area"></div>
<div id="readonly-notice" class="readonly-notice" style="display:none">👁 只读模式 · 查看共享版本，无法编辑</div>
<main id="main-content"><div style="padding:40px 0;text-align:center;color:var(--text-3)">加载中...</div></main>
</div>

<!-- ── Stock Detail Page ── -->
<div class="page" id="stockPage">
  <div class="page-header">
    <button class="page-back" onclick="closeStockPage()">←</button>
    <div>
      <div class="page-title" id="stockPageTitle">股票详情</div>
      <div class="page-subtitle" id="stockPageSubtitle"></div>
    </div>
    <button class="btn btn-primary page-save-btn" onclick="saveStockAnalysis()">保存分析 ↑</button>
  </div>
  <div class="page-body">
    <div class="analysis-grid">
      <div class="analysis-section">
        <div class="section-header"><span class="section-icon">🏭</span><span class="section-title">行业分析</span><span class="save-indicator" id="si-industry"></span></div>
        <div class="section-body"><textarea class="analysis-textarea" id="ta-industry" placeholder="行业格局、竞争壁垒、上下游关系、市场空间..."></textarea></div>
      </div>
      <div class="analysis-section">
        <div class="section-header"><span class="section-icon">📦</span><span class="section-title">主营产品</span><span class="save-indicator" id="si-products"></span></div>
        <div class="section-body"><textarea class="analysis-textarea" id="ta-products" placeholder="核心产品线、收入结构、毛利率、产能情况..."></textarea></div>
      </div>
      <div class="analysis-section">
        <div class="section-header"><span class="section-icon">📊</span><span class="section-title">业绩预期</span><span class="save-indicator" id="si-earnings"></span></div>
        <div class="section-body"><textarea class="analysis-textarea" id="ta-earnings" placeholder="近期季报数据、营收/净利增速、分析师预期、业绩驱动因素..."></textarea></div>
      </div>
      <div class="analysis-section">
        <div class="section-header"><span class="section-icon">✅</span><span class="section-title">买入逻辑</span><span class="save-indicator" id="si-bull"></span></div>
        <div class="section-body"><textarea class="analysis-textarea" id="ta-bull" placeholder="为什么买、核心催化剂、目标价位、持有周期..."></textarea></div>
      </div>
      <div class="analysis-section">
        <div class="section-header"><span class="section-icon">🌏</span><span class="section-title">海外观点</span><span class="save-indicator" id="si-global"></span></div>
        <div class="section-body"><textarea class="analysis-textarea" id="ta-global" placeholder="外资机构评级、对标海外公司、海外产业链动态..."></textarea></div>
      </div>
      <div class="analysis-section">
        <div class="section-header"><span class="section-icon">⚠️</span><span class="section-title">风险点</span><span class="save-indicator" id="si-risk"></span></div>
        <div class="section-body"><textarea class="analysis-textarea" id="ta-risk" placeholder="主要风险、止损条件、需要跟踪的反转信号..."></textarea></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit overlay -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-panel">
    <h2 id="editTitle">新增赛道</h2>
    <div class="form-2col">
      <div class="form-row"><label>行业大类</label><input id="f-category" placeholder="如：通信 / 电子 / 半导体"></div>
      <div class="form-row"><label>行业小类</label><input id="f-subcategory" placeholder="如：光互联 / 被动元件"></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>关键词</label><input id="f-keyword" placeholder="如：CPO / MLCC / PCB"></div>
      <div class="form-row"><label>景气度阶段</label>
        <select id="f-phase">
          <option value="concept">概念期 — 炒预期</option>
          <option value="inflection">拐点期 — 订单/业绩初现</option>
          <option value="realization">业绩兑现期 — 可拿业绩</option>
          <option value="late">尾声期 — 估值偏高</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>释义</label><textarea id="f-definition" placeholder="该技术/赛道的核心定义"></textarea></div>

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

}
async function loadStocksFromGitHub() {
  try {
    const res = await fetch(STOCKS_RAW + '?t=' + Date.now());
    if (res.ok) {
      const remote = await res.json();
      // merge: remote wins for keys that exist, local fills the rest
      stockAnalyses = Object.assign({}, stockAnalyses, remote);
      saveStockDataLocal();
      // get SHA for future updates
      const token = getToken();
      if (token) {
        const meta = await fetch(STOCKS_API, { headers: { Authorization: 'token ' + token } });
        if (meta.ok) { const j = await meta.json(); stocksSHA = j.sha; }
      }
    }
  } catch(e) { /* keep local data */ }
}
async function saveStocksToGitHub() {
  const token = getToken();
  if (!token) return;
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(stockAnalyses, null, 2))));

    if (res.ok) { stocksSHA = j.content.sha; return true; }

}

// ── GitHub I/O ──
async function loadFromGitHub() {
  syncStatus('loading', '加载数据...');
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (res.ok) {
      data = await res.json();
      console.log('[mapping] loaded from GitHub, categories:', data.categories?.length);
      const token = getToken();
      if (token) {
        const meta = await fetch(API_URL, { headers: { Authorization: 'token ' + token } });
        if (meta.ok) { const j = await meta.json(); fileSHA = j.sha; }
      }
      syncStatus('ok', '已从云端加载');
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      syncStatus('err', '云端暂无数据，请先同步');
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    syncStatus('err', '加载失败，显示默认数据');
  }
  buildFilterOptions();
  render();
}

async function syncToGitHub() {
  const token = getToken();
  if (!token) { alert('请先输入 GitHub Token'); return; }
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  syncStatus('loading', '同步中...');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const body = { message: '更新题材mapping ' + new Date().toLocaleString('zh-CN'), content, branch: BRANCH };
    if (fileSHA) body.sha = fileSHA;
    const res = await fetch(API_URL, { method:'PUT', headers:{ Authorization:'token '+token, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
    const j = await res.json();
    if (res.ok) { fileSHA = j.content.sha; syncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})); }
    else syncStatus('err', '同步失败：' + (j.message || res.status));
  } catch(e) { syncStatus('err', '网络错误'); }
  btn.disabled = false;
}

function syncStatus(state, text) {
  document.getElementById('syncText').textContent = text;
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state==='ok' ? ' ok' : state==='err' ? ' err' : ' loading');
}

// ── Filter & Search ──
function buildFilterOptions() {
  if (!data) return;
  const cats = new Set(), subs = new Set();
  data.categories.forEach(cat => cat.cards.forEach(card => {
    cats.add(card.category); subs.add(card.subcategory);
  }));
  const catSel = document.getElementById('filterCat');
  const subSel = document.getElementById('filterSub');
  catSel.innerHTML = '<option value="">全部行业大类</option>' + [...cats].map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  subSel.innerHTML = '<option value="">全部行业小类</option>' + [...subs].map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
}

function applyFilters() {
  filterState.search = document.getElementById('searchInput').value.trim().toLowerCase();
  filterState.cat = document.getElementById('filterCat').value;
  filterState.sub = document.getElementById('filterSub').value;
  render();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCat').value = '';
  document.getElementById('filterSub').value = '';
  filterState = { search:'', cat:'', sub:'' };
  render();
}

function cardMatches(card) {
  const { search, cat, sub } = filterState;
  if (cat && card.category !== cat) return false;
  if (sub && card.subcategory !== sub) return false;
  if (search) {
    const haystack = [card.category, card.subcategory, card.keyword, card.definition,
      ...(card.logic||[]), card.risk,
      ...(card.indicators||[]).map(i=>i.label+' '+i.text),
      ...(card.catalysts||[]),
      ...(card.stocks||[]).map(s=>s.code+' '+s.name+' '+s.desc)
    ].join(' ').toLowerCase();
    if (!haystack.includes(search)) return false;
  }
  return true;
}

function highlight(text, query) {
  if (!query || !text) return esc(text);
  const escaped = esc(text);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escaped.replace(re, '<span class="highlight">$1</span>');
}

// ── Rendering ──
const PHASE_MAP = {
  concept:     { label:'概念期',     cls:'phase-blue',  op:'炒预期，仓位轻' },
  inflection:  { label:'拐点期',     cls:'phase-amber', op:'订单/业绩初现' },
  realization: { label:'业绩兑现期', cls:'phase-green', op:'可持仓吃业绩' },
  late:        { label:'尾声期',     cls:'phase-amber', op:'估值偏高，注意减仓' }
};

function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  if (!data) return;
  let totalShown = 0;
  const q = filterState.search;

  data.categories.forEach(cat => {
    const visibleCards = cat.cards.filter(cardMatches);
    if (visibleCards.length === 0) return;
    totalShown += visibleCards.length;
    const catDiv = document.createElement('div');
    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = `<span class="cat-label">${esc(cat.label)}</span><div class="cat-line"></div>`;
    catDiv.appendChild(hdr);
    visibleCards.forEach(card => catDiv.appendChild(renderCard(card, cat.id, q)));
    if (isOwner) {
      const addBtn = document.createElement('button');
      addBtn.className = 'add-row-btn';
      addBtn.innerHTML = `<span>＋</span> 在「${esc(cat.label.replace(/[📡🔌🔧📈🏭]/g,'').trim())}」下新增赛道`;
      addBtn.onclick = () => openAddCard(cat.id);
      catDiv.appendChild(addBtn);
    }
    main.appendChild(catDiv);
  });

  if (totalShown === 0) {
    main.innerHTML = `<div class="no-results">未找到匹配的赛道，试试清除筛选条件</div>`;
  }

  const total = data.categories.reduce((n,c)=>n+c.cards.length,0);
  const countEl = document.getElementById('resultCount');
  if (filterState.search || filterState.cat || filterState.sub) {
    countEl.textContent = `显示 ${totalShown} / ${total} 个赛道`;
  } else {
    countEl.textContent = `共 ${total} 个赛道`;
  }

  if (isOwner) {
    const newCatBtn = document.createElement('button');
    newCatBtn.className = 'add-row-btn';
    newCatBtn.style.marginTop = '20px';
    newCatBtn.innerHTML = '＋ 新增行业大类';
    newCatBtn.onclick = () => openAddCard(null);
    main.appendChild(newCatBtn);
  }
}

      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="editCard('${card.id}','${catId}')">✏ 编辑</button>

  // Stocks with click to detail

    const hasNotes = stockAnalyses[s.code] && Object.values(stockAnalyses[s.code]).some(v=>v&&v.trim());
    return `<div class="stock-row" onclick="openStockPage('${esc(s.code)}','${esc(s.name)}','${esc(card.keyword)}')">
      <span class="stock-code">${highlight(s.code,q)}</span>
      <span class="stock-name">${highlight(s.name,q)}</span>
      <span class="stock-desc">${highlight(s.desc,q)}</span>
      <span class="stock-arrow">${hasNotes ? '📝' : '›'}</span>
    </div>`;
  }).join('');

  // East money link
  const emLink = `<a class="ext-link-chip" href="https://quote.eastmoney.com/center/gridlist.html#hs_s__${encodeURIComponent(card.keyword)}" target="_blank">📈 东方财富板块行情 ↗</a>`;

  wrap.innerHTML = `
    <div class="card-top" onclick="toggleCard('${card.id}')">
      <div class="cell-meta"><div class="meta-label">大类</div><div class="meta-val">${highlight(card.category,q)}</div></div>
      <div class="cell-meta"><div class="meta-label">小类</div><div class="meta-val">${highlight(card.subcategory,q)}</div></div>
      <div class="cell-meta"><div class="meta-label">关键词</div><span class="tag ${tagCls}">${highlight(card.keyword,q)}</span></div>
      <div class="cell-meta" style="display:flex;align-items:center;gap:12px;justify-content:space-between">
        <div>
          <div class="meta-label">景气度阶段</div>
          <span class="phase-badge ${phase.cls}"><span class="phase-dot"></span>${phase.label}</span>
          ${SECTOR_STOCKS[card.id] ? `<span id="sector-badge-${card.id}" class="sector-change sector-loading">加载中</span>` : ''}
          <div style="font-size:10px;color:var(--text-3);margin-top:3px">${phase.op}</div>
        </div>
        <div class="expand-hint"><span style="font-size:11px;color:var(--text-3)">详情</span><span class="chevron">▾</span></div>
      </div>
    </div>
    <div class="card-body">
      <div class="def-row"><strong style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-right:8px">释义</strong>${highlight(card.definition,q)}</div>
      <div class="body-section">
        <div class="body-title">看多核心逻辑</div>
        ${(card.logic||[]).map((l,i)=>`<div class="logic-item"><span class="logic-num">${i+1}</span><span>${highlight(l,q)}</span></div>`).join('')}
        ${card.risk?`<div class="logic-risk">⚠ ${highlight(card.risk,q)}</div>`:''}
      </div>
      <div class="body-section">
        <div class="body-title">关注指标</div>
        ${(card.indicators||[]).map(ind=>`<div class="indicator-row"><span class="ind-label">${esc(ind.label)}</span><span style="color:var(--text-2)">${highlight(ind.text,q)}</span></div>`).join('')}
        <div style="margin-top:14px"></div>
        <div class="body-title">催化剂 / 时间节点</div>
        ${(card.catalysts||[]).map(c=>`<div class="catalyst-item">${highlight(c,q)}</div>`).join('')}
      </div>
      <div class="body-section">
        <div class="body-title">代表股票 <span style="font-size:10px;color:var(--text-3);font-weight:400">· 点击进入个股分析</span></div>
        <div class="stocks-grid">${stocksHtml}</div>
        ${emLink}
        ${editBtns}
      </div>
    </div>`;
  return wrap;
}

function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

// ── Stock Detail Page ──
function openStockPage(code, name, sector) {
  currentStockKey = code;
  document.getElementById('stockPageTitle').textContent = `${name}（${code}）`;
  document.getElementById('stockPageSubtitle').textContent = `赛道：${sector} · 点击各板块填写分析笔记`;

  const fields = ['industry','products','earnings','bull','global','risk'];
  const saved = stockAnalyses[code] || {};
  fields.forEach(f => {
    document.getElementById('ta-'+f).value = saved[f] || '';
    document.getElementById('si-'+f).textContent = '';
  });

  document.getElementById('stockPage').classList.add('active');
  document.getElementById('mainPage').style.overflow = 'hidden';
}

function closeStockPage() {
  document.getElementById('stockPage').classList.remove('active');
  document.getElementById('mainPage').style.overflow = '';
  currentStockKey = null;
  render(); // refresh to update note indicators
}

async function saveStockAnalysis() {
  if (!currentStockKey) return;
  const fields = ['industry','products','earnings','bull','global','risk'];
  const obj = {};
  fields.forEach(f => { obj[f] = document.getElementById('ta-'+f).value; });
  stockAnalyses[currentStockKey] = obj;
  saveStockDataLocal();
  fields.forEach(f => {
    document.getElementById('si-'+f).textContent = obj[f].trim() ? '已保存 ✓' : '';
  });
  const token = getToken();
  if (token) {
    syncStatus('loading', '正在同步个股笔记...');
    const ok = await saveStocksToGitHub();
    if (ok) {
      syncStatus('ok', '个股笔记已同步 · ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
    } else {
      syncStatus('err', '云端同步失败，已保存到本地');
    }
  } else {
    syncStatus('ok', '个股笔记已保存（本地）');
  }
}

// ── Edit / Add ──
function openAddCard(catId) {
  if (!isOwner) return;
  editingId = null; editingCatId = catId || null;
  document.getElementById('editTitle').textContent = '新增赛道';
  clearForm();
  document.getElementById('editOverlay').classList.add('open');
}

function editCard(cardId, catId) {
  if (!isOwner) return;
  editingId = cardId; editingCatId = catId;
  const cat = data.categories.find(c=>c.id===catId);
  const card = cat && cat.cards.find(c=>c.id===cardId);
  if (!card) return;
  document.getElementById('editTitle').textContent = '编辑：' + card.keyword;
  document.getElementById('f-category').value = card.category||'';
  document.getElementById('f-subcategory').value = card.subcategory||'';
  document.getElementById('f-keyword').value = card.keyword||'';
  document.getElementById('f-phase').value = card.phase||'concept';
  document.getElementById('f-definition').value = card.definition||'';
  document.getElementById('f-logic').value = (card.logic||[]).join('\n');
  document.getElementById('f-risk').value = card.risk||'';
  document.getElementById('f-indicators').value = (card.indicators||[]).map(i=>i.label+': '+i.text).join('\n');
  document.getElementById('f-catalysts').value = (card.catalysts||[]).join('\n');
  document.getElementById('f-stocks').value = (card.stocks||[]).map(s=>s.code+' '+s.name+' | '+s.desc).join('\n');
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); }

function clearForm() {
  ['f-category','f-subcategory','f-keyword','f-definition','f-logic','f-risk','f-indicators','f-catalysts','f-stocks'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('f-phase').value = 'concept';
}

function saveCard() {
  const category = document.getElementById('f-category').value.trim();
  const keyword = document.getElementById('f-keyword').value.trim();
  if (!category || !keyword) { alert('请填写行业大类和关键词'); return; }
  const logicRaw = document.getElementById('f-logic').value.trim();
  const indRaw = document.getElementById('f-indicators').value.trim();
  const catRaw = document.getElementById('f-catalysts').value.trim();
  const stockRaw = document.getElementById('f-stocks').value.trim();
  const card = {
    id: editingId || ('card_'+Date.now()),
    category, subcategory: document.getElementById('f-subcategory').value.trim(),
    keyword, tagColor:'blue', phase: document.getElementById('f-phase').value,
    definition: document.getElementById('f-definition').value.trim(),
    logic: logicRaw ? logicRaw.split('\n').filter(l=>l.trim()) : [],
    risk: document.getElementById('f-risk').value.trim(),
    indicators: indRaw ? indRaw.split('\n').filter(l=>l.trim()).map(l=>{ const [lbl,...rest]=l.split(':'); return {label:lbl.trim(),text:rest.join(':').trim()}; }) : [],
    catalysts: catRaw ? catRaw.split('\n').filter(l=>l.trim()) : [],
    stocks: stockRaw ? stockRaw.split('\n').filter(l=>l.trim()).map(l=>{ const [codes,desc]=l.split('|'); const parts=(codes||'').trim().split(/\s+/); return {code:parts[0]||'',name:parts.slice(1).join(' '),desc:(desc||'').trim()}; }) : []
  };
  if (editingId) {
    data.categories.forEach(cat=>{ const idx=cat.cards.findIndex(c=>c.id===editingId); if(idx>=0) cat.cards[idx]=card; });
  } else {
    let targetCat = editingCatId ? data.categories.find(c=>c.id===editingCatId) : null;
    if (!targetCat) { targetCat={id:'cat_'+Date.now(),label:category,cards:[]}; data.categories.push(targetCat); }
    targetCat.cards.push(card);
  }
  closeEdit(); buildFilterOptions(); render();
  syncStatus('loading','有未同步的更改');
}

function deleteCard(cardId, catId) {
  if (!confirm('确认删除这个赛道？')) return;
  const cat = data.categories.find(c=>c.id===catId);
  if (cat) cat.cards = cat.cards.filter(c=>c.id!==cardId);
  data.categories = data.categories.filter(c=>c.cards.length>0);
  buildFilterOptions(); render();
  syncStatus('loading','有未同步的更改');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

  'cpo': [
    '300308','300502','300394','601869','002281',
    '000988','600487','688048','300757','688498',
    '300620','688313','688205','688195','300548',

let sectorChanges = {};
let _sinaLoaded = {};   // code -> {now, prev, change}
let _sinaScripts = [];  // keep refs to avoid GC

// ── Fetch sector data via Cloudflare Worker ──
const WORKER_URL = 'https://sina-proxy.picwhi.workers.dev';

async function fetchSinaText(sinaUrl) {
  const codes = sinaUrl.split('list=')[1] || '';
  try {
    const r = await fetch(`${WORKER_URL}?codes=${encodeURIComponent(codes)}`, {
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) return '';
    // Sina returns GBK - read as arraybuffer and decode properly
    const buf = await r.arrayBuffer();
    try {
      const text = new TextDecoder('gbk').decode(buf);
      return text;
    } catch(e) {
      return new TextDecoder('utf-8').decode(buf);
    }
  } catch(e) {
    return '';
  }
}

function parseSinaText(text) {
  // Sina format: name,open,prev_close,now,high,low,...,date,time,..
  const re = /hq_str_s[hz](\d+)="([^"]*)"/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const code = m[1];
    const parts = m[2].split(',');
    if (parts.length < 4) continue;
    const prev = parseFloat(parts[2]); // yesterday close
    const now  = parseFloat(parts[3]); // current / today close
    const open = parseFloat(parts[1]); // today open
    // After hours: now may be 0, use open as fallback, or skip if all zero
    const price = now > 0 ? now : open > 0 ? open : 0;
    if (prev > 0 && price > 0) {
      _sinaLoaded[code] = { now: price, prev, change: (price - prev) / prev * 100 };
    }
  }
}

async function fetchSectorChanges() {
  const allCodes = [...new Set(Object.values(SECTOR_STOCKS).flat())];
  // Batch into groups of 20
  const batches = [];
  for (let i = 0; i < allCodes.length; i += 20) batches.push(allCodes.slice(i, i + 20));

  await Promise.all(batches.map(async batch => {
    const sinaVars = batch.map(c => {
      // Shanghai: 6xxxxx | Shenzhen: 0xxxxx, 3xxxxx, 2xxxxx
      return (c.startsWith('6') ? 'sh' : 'sz') + c;
    }).join(',');
    const text = await fetchSinaText('https://hq.sinajs.cn/list=' + sinaVars);
    if (text) parseSinaText(text);
  }));

  // Compute averages
  Object.entries(SECTOR_STOCKS).forEach(([id, codes]) => {
    const vals = codes.map(c => _sinaLoaded[c]?.change).filter(v => v !== undefined && !isNaN(v));
    if (!vals.length) return;
    sectorChanges[id] = { avg: vals.reduce((a,b)=>a+b,0)/vals.length, n: vals.length };
  });

  updateSectorBadges();
}

function updateSectorBadges() {
  Object.entries(sectorChanges).forEach(([id, { avg, n }]) => {
    const el = document.getElementById('sector-badge-' + id);
    if (!el) return;
    if (n === 0) { el.style.display = 'none'; return; }
    const sign = avg >= 0 ? '+' : '';
    el.textContent = sign + avg.toFixed(2) + '%';
    el.title = `${n}只成分股均值`;
    el.className = 'sector-change ' + (avg > 0.05 ? 'sector-up' : avg < -0.05 ? 'sector-down' : 'sector-flat');
    el.style.display = '';
  });
}

// Hide all "加载中" badges after 15s if no data arrived
setTimeout(() => {
  document.querySelectorAll('.sector-loading').forEach(el => {
    el.style.display = 'none';
  });
}, 15000);

// Auto-refresh: always show data (closing price outside trading hours)
function startSectorRefresh() {
  fetchSectorChanges();
  setInterval(() => {
    fetchSectorChanges(); // refresh every 90s always
  }, 90000);
}

init();
// Delay sector fetch slightly to let page render first
setTimeout(startSectorRefresh, 2000);
